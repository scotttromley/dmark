name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . ruff mypy

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy (targeted modules)
        run: |
          python -m mypy --follow-imports=skip \
            src/dmark/parser.py \
            src/dmark/classification.py \
            src/dmark/time_series.py
